<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="CSS/sofi.css">
  <title>10 Dôvodov prečo sa mi páčiš</title>

</head>
 <style>* {
  margin: 0;
  box-sizing: border-box;
}

body {
  background-color: palevioletred;
  font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
}

/* Title */
.nazov {
  display: flex;
  justify-content: center;
  font-size: 75px;
  margin-top: 20px;
}

/* Reasons */
.dovody {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  font-size: 30px;
  margin-top: 30px;
}

/* PS text */
.PS {
  display: flex;
  justify-content: center;
  margin-top: 20px;
  font-size: 24px;
}

/* Images row */
.images {
  display: flex;
  justify-content: space-evenly;  /* evenly spread */
  align-items: flex-start;
  margin-top: 40px;
  padding: 0 20px;
}

/* Base image style – clear and responsive */
.img {
  max-width: 100%;
  height: auto;
  width: 260px;                 /* base size */
  border: 6px solid violet;     /* thin violet border */
  border-radius: 10px;          /* optional rounded corners */
}

/* First and last higher + slightly bigger */
.img1,
.img2 {
  width: 290px;                 /* a bit bigger */
  transform: translateY(-30px); /* move higher */
}

/* Middle image normal */
.img3 {
  width: 260px;
}

/* Password-like code at bottom */
.phone-code {
  text-align: center;
  margin-top: 30px;
  font-size: 22px;
  letter-spacing: 4px;   /* looks like a special code */
  color: white;
}

/* Simple responsiveness with media query */
@media (max-width: 768px) {
  .nazov {
    font-size: 45px;
    text-align: center;
    padding: 0 10px;
  }

  .dovody {
    font-size: 22px;
    padding: 0 10px;
  }

  .PS {
    font-size: 20px;
  }

  .images {
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .img,
  .img1,
  .img2,
  .img3 {
    width: 80%;          /* scale to screen */
    transform: translateY(0); /* no vertical shift on small screens */
  }

  .phone-code {
    font-size: 20px;
    letter-spacing: 2px;
  }
}</style>
<body>
  <div class="nazov">
    10 Dôvodov prečo sa mi páčiš
  </div>

  <div class="dovody">
    <div>1. Tvoj úsmev</div> 
    <div>2. Tvoje nádherné zelené oči</div>
    <div>3. Tvoj smiech</div>
    <div>4. Tvoje hnedé vlasy</div>
    <div>5. Tvoju milosť</div>
    <div>6. Tvoje yappovanie</div>
    <div>7. Tvoje vtipy</div>
    <div>8. Tvoju disciplínu</div>
    <div>9. Tvoju ochotu</div>
    <div>10. Ty celá</div>
  </div>

  <div class="PS">
    PS: je ich oveľa viac
  </div>

  <div class="images">
    <img src="image.jpg" alt="" class="img1">
    <img src="image2.jpg" alt="" class="img2">
    <img src="image3.jpg" alt="" class="img3">
  </div>

 
  <script src="JS/sofi.js"></script>
</body>
</html>
